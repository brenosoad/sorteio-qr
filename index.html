<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(circle at 50% 0%, rgba(220, 38, 38, 0.18) 0%, transparent 55%),
      radial-gradient(circle at 50% 0%, #1c1c26 0%, #0a0a0f 70%);
    color: #fff;
    padding: 24px;
  }

  .card {
    max-width: 380px;
    width: 100%;
    background: #15151c;
    border: 1px solid rgba(255,255,255,0.08);
    border-top: 3px solid #dc2626;
    border-radius: 24px;
    padding: 40px 28px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(220,38,38,0.05);
    opacity: 0;
    transform: translateY(12px);
    animation: rise 0.5s ease forwards;
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    width: 130px;
    margin: 0 auto 26px;
    display: block;
    filter: drop-shadow(0 4px 16px rgba(220, 38, 38, 0.35));
  }

  .icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon svg { width: 34px; height: 34px; }

  h1 {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 10px;
    letter-spacing: -0.02em;
  }

  p {
    font-size: 15px;
    color: #9a9aa5;
    line-height: 1.5;
    margin: 0;
  }

  .ok .icon { background: rgba(74, 222, 128, 0.12); }
  .ok .icon svg { stroke: #4ade80; }
  .ok h1 { color: #4ade80; }

  .blocked .icon { background: rgba(248, 113, 113, 0.12); }
  .blocked .icon svg { stroke: #f87171; }
  .blocked h1 { color: #f87171; }

  .premio-box {
    margin-top: 18px;
    padding: 18px 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(74, 222, 128, 0.14), rgba(74, 222, 128, 0.04));
    border: 1px solid rgba(74, 222, 128, 0.35);
  }

  .premio-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #4ade80;
    margin: 0 0 6px;
  }

  .premio-nome {
    font-size: 19px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
    margin: 0;
  }

  .loading .icon {
    background: rgba(255,255,255,0.06);
    animation: spin 1s linear infinite;
  }
  .loading .icon svg { stroke: #9a9aa5; }
  .loading h1 { color: #d4d4d8; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="card loading" id="card">
    <img src="logo.png" alt="Bike and Fly Araraquara" class="logo">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="9" stroke-dasharray="42" stroke-dashoffset="14"/>
      </svg>
    </div>
    <h1>Verificando...</h1>
    <p>Aguarde um instante.</p>
  </div>

  <script>
    const ICONS = {
      ok: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>',
      blocked: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>'
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const card = document.getElementById("card");

    function render(state, title, text) {
      card.className = state;
      card.style.animation = "none";
      void card.offsetWidth;
      card.style.animation = "rise 0.5s ease forwards";
      card.innerHTML = `<img src="logo.png" alt="Bike and Fly Araraquara" class="logo"><div class="icon">${ICONS[state] || ""}</div><h1>${title}</h1><p>${text}</p>`;
    }

    function renderPremio(premio) {
      card.className = "ok";
      card.style.animation = "none";
      void card.offsetWidth;
      card.style.animation = "rise 0.5s ease forwards";
      card.innerHTML = `<img src="logo.png" alt="Bike and Fly Araraquara" class="logo"><div class="icon">${ICONS.ok}</div><h1>Parabéns!</h1><p>Você ganhou:</p><div class="premio-box"><p class="premio-label">Seu prêmio</p><p class="premio-nome">${premio}</p></div>`;
    }

    if (!id) {
      render("blocked", "Link inválido", "Este link não possui um código de acesso.");
    } else {
      // ==== CONFIGURE AQUI ====
      // Cole a URL do App da Web do Google Apps Script (termina com /exec)
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXOXeneXtUeJWxYyEwhGQPXyXYSPyFZqLfT7mn_xn-HBtYkMLsimjT9GAPgu7kPo4S/exec";
      // =========================

      fetch(`${SCRIPT_URL}?id=${encodeURIComponent(id)}`)
        .then(r => r.json())
        .then(data => {
          if (data.status === "invalido") {
            render("blocked", "Código inválido", "Este código não existe.");
            return;
          }
          if (data.status === "ja_usado") {
            render("blocked", "Já utilizado", "Este código já foi acessado anteriormente e não pode ser usado novamente.");
            return;
          }
          fetch("premios.json")
            .then(r => r.json())
            .then(premios => {
              const premio = premios[id] || "Prêmio surpresa!";
              renderPremio(premio);
            })
            .catch(() => {
              render("ok", "Acesso liberado", "Erro ao carregar o prêmio, mas seu código é válido. Mostre esta tela no balcão.");
            });
        })
        .catch(() => {
          render("blocked", "Erro", "Não foi possível verificar o código. Tente novamente.");
        });
    }
  </script>
</body>
</html>
